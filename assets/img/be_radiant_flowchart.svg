<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="380" fill="#ffffff"/>

  <!-- Phase Header Bands -->
  <!-- Screening -->
  <rect x="20" y="20" width="130" height="34" rx="4" fill="#d0d0d0"/>
  <text x="85" y="42" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Screening period</text>

  <!-- Double-blind initial -->
  <rect x="158" y="20" width="200" height="34" rx="4" fill="#909090"/>
  <text x="258" y="38" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Double-blind</text>
  <text x="258" y="51" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">initial period</text>

  <!-- Double-blind maintenance -->
  <rect x="366" y="20" width="514" height="34" rx="4" fill="#555"/>
  <text x="623" y="38" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Double-blind maintenance</text>
  <text x="623" y="51" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">treatment period</text>

  <!-- ===== BIMEKIZUMAB ARM ===== -->
  <!-- Arrow: bimekizumab initial (Week 0 → 16) -->
  <!-- Arrow body -->
  <polygon points="168,115 348,115 368,135 348,155 168,155" fill="none" stroke="#3aaedc" stroke-width="2.5"/>
  <text x="260" y="131" text-anchor="middle" font-size="12" fill="#3aaedc" font-weight="600">Bimekizumab</text>
  <text x="260" y="148" text-anchor="middle" font-size="12" fill="#3aaedc" font-weight="600">320 mg Q4W</text>

  <!-- Arrow: bimekizumab Q4W maintenance (Week 16 → 48) -->
  <polygon points="375,95 855,95 875,115 855,135 375,135" fill="none" stroke="#3aaedc" stroke-width="2.5"/>
  <text x="620" y="111" text-anchor="middle" font-size="12" fill="#3aaedc" font-weight="600">Bimekizumab 320 mg Q4W</text>
  <text x="620" y="127" text-anchor="middle" font-size="10" fill="#3aaedc"/>

  <!-- Arrow: bimekizumab Q8W maintenance (Week 16 → 48) -->
  <polygon points="375,145 855,145 875,165 855,185 375,185" fill="none" stroke="#4a5dbf" stroke-width="2.5"/>
  <text x="620" y="161" text-anchor="middle" font-size="12" fill="#4a5dbf" font-weight="600">Bimekizumab 320 mg Q8W</text>
  <text x="620" y="177" text-anchor="middle" font-size="10" fill="#4a5dbf"/>

  <!-- ===== SECUKINUMAB ARM ===== -->
  <!-- Arrow: secukinumab (Week 0 → 48) -->
  <polygon points="168,225 855,225 875,250 855,275 168,275" fill="none" stroke="#e87ea1" stroke-width="2.5"/>
  <text x="520" y="246" text-anchor="middle" font-size="12" fill="#e87ea1" font-weight="600">Secukinumab 300 mg Q4W</text>
  <tspan/>
  <text x="672" y="264" text-anchor="start" font-size="9" fill="#e87ea1">a</text>

  <!-- ===== LEFT TREE: BE RADIANT label + branches ===== -->
  <!-- BE RADIANT label -->
  <text x="30" y="195" font-size="13" fill="#1a2e5a" font-weight="700">BE RADIANT</text>
  <text x="38" y="210" font-size="12" fill="#1a2e5a">N = 743</text>

  <!-- Vertical line connecting the two branches -->
  <line x1="100" y1="135" x2="100" y2="250" stroke="#1a2e5a" stroke-width="2.5"/>
  <!-- Top branch line → bimekizumab -->
  <line x1="100" y1="135" x2="165" y2="135" stroke="#1a2e5a" stroke-width="2.5"/>
  <!-- Bottom branch line → secukinumab -->
  <line x1="100" y1="250" x2="165" y2="250" stroke="#1a2e5a" stroke-width="2.5"/>

  <!-- n labels -->
  <text x="115" y="128" font-size="12" fill="#1a2e5a">n = 373</text>
  <text x="115" y="243" font-size="12" fill="#1a2e5a">n = 370</text>

  <!-- 1:1 randomization label -->
  <text x="52" y="192" font-size="10" fill="#555" text-anchor="middle">1:1</text>
  <text x="52" y="204" font-size="10" fill="#555" text-anchor="middle">randomization</text>

  <!-- ===== TIMELINE AXIS ===== -->
  <!-- Main timeline arrow -->
  <line x1="150" y1="310" x2="880" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <!-- Left part (screening, lighter) -->
  <line x1="30" y1="310" x2="155" y2="310" stroke="#bbb" stroke-width="1.5"/>

  <!-- Week markers: vertical ticks -->
  <!-- Week 0 -->
  <line x1="165" y1="304" x2="165" y2="316" stroke="#888" stroke-width="1.5"/>
  <!-- Week 16 -->
  <line x1="370" y1="304" x2="370" y2="316" stroke="#888" stroke-width="1.5"/>
  <!-- Week 48 -->
  <line x1="875" y1="304" x2="875" y2="316" stroke="#888" stroke-width="1.5"/>

  <!-- Arrowheads on timeline segments (double-headed between phases) -->
  <!-- arrow left between screening & week 0 -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#888"/>
    </marker>
    <marker id="arrowGrayL" markerWidth="8" markerHeight="8" refX="2" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Double-headed arrow: Week 0 ↔ Week 16 -->
  <line x1="168" y1="322" x2="368" y2="322" stroke="#888" stroke-width="1.2"
        marker-start="url(#arrowGrayL)" marker-end="url(#arrowGray)"/>

  <!-- Double-headed arrow: Week 16 ↔ Week 48 -->
  <line x1="373" y1="322" x2="873" y2="322" stroke="#888" stroke-width="1.2"
        marker-start="url(#arrowGrayL)" marker-end="url(#arrowGray)"/>

  <!-- Timeline labels -->
  <text x="85" y="330" text-anchor="middle" font-size="11" fill="#555">2–5 weeks</text>
  <text x="165" y="344" text-anchor="middle" font-size="11.5" fill="#333" font-weight="600">Week 0</text>
  <text x="370" y="344" text-anchor="middle" font-size="11.5" fill="#333" font-weight="600">Week 16</text>
  <text x="875" y="344" text-anchor="middle" font-size="11.5" fill="#333" font-weight="600">Week 48</text>

  <!-- Footnote -->
  <text x="30" y="368" font-size="9.5" fill="#666">
    <tspan font-size="8" baseline-shift="super">a</tspan> With loading doses at Weeks 0, 1, 2, 3, and 4
  </text>

</svg>
